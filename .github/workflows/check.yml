name: R CMD check
on: [push, pull_request]
permissions:
  contents: read
jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        image: [
          "ubuntu-24.04",
          "ubuntu-24.04-arm",
          "macos-26",
          "macos-26-intel",
          "windows-2025",
          "windows-11-arm",
        ]
        r_version: [
          "release",
          "4.5.0",
        ]
    runs-on: ${{ matrix.image }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Read build.zig.zon
        shell: bash
        run: |
          VERSION=$(perl -ne 'print $& if /\.\s*minimum_zig_version\s*=\s*"\K[^"]+/' src/build.zig.zon)
          echo "MINIMUM_ZIG_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.MINIMUM_ZIG_VERSION }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r_version }}

      - name: Install dependencies on Ubuntu
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libavif-dev

      - name: Install dependencies on macOS
        if: ${{ runner.os == 'macOS' }}
        run: |
          brew update
          brew install libavif

      - name: Install dependencies on Windows
        if: ${{ runner.os == 'Windows' && runner.arch == 'X64' }}
        run: pacman -Sy --noconfirm mingw-w64-ucrt-x86_64-libavif

      - name: Install dependencies on WoA
        if: ${{ runner.os == 'Windows' && runner.arch == 'ARM64' }}
        run: pacman -Sy --noconfirm mingw-w64-clang-aarch64-libavif

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
